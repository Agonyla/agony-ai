spring:
  ai:
    openai:
      # 如果用 DeepSeek，改成 https://api.deepseek.com
      # 如果用 OpenAI，改成 https://api.openai.com（或者不填，默认就是这个）
      base-url: https://api.deepseek.com
      api-key: ${DEEPSEEK_API_KEY}   # 从环境变量读取，不要直接写在配置文件里
      chat:
        options:
          model: deepseek-chat        # DeepSeek-V3 的模型名
          temperature: 0.7

  profiles:
    active: local

# springdoc-openapi项目配置
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'chatClient'
      packages-to-scan: com.agony.springai.controller.chatClient
    - group: 'prompt'
      packages-to-scan: com.agony.springai.controller.prompt